name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd_linux

      - run: make doc_site

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./site"

  deployment:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  test-macos:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/hosted/pub.dev/betto_onnxrt-*/.dart_tool/betto_onnxrt
          key: ort-${{ runner.os }}-${{ hashFiles('integration_test_app/pubspec.lock') }}

      - name: Cache model files
        uses: actions/cache@v4
        with:
          path: ~/.cache/betto_inferencing_models
          key: models-bge-small-en-v1.5-828e1496d7fabb79cfa4dcd84fa38625c0d3d21da474a00f08db0f559940cf35

      - name: Export model cache path
        run: echo "MODEL_CACHE_DIR=$HOME/.cache/betto_inferencing_models" >> "$GITHUB_ENV"

      - run: make cicd_macos

  test-windows:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_windows
        shell: bash
